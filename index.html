<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>BARE by Biograpi · 360°</title>
<link rel="stylesheet" href="pannellum.css">
<style>
  html,body{margin:0;padding:0;height:100%;background:#7C3146;overflow:hidden;}
  #pano{width:100%;height:100vh;background:#7C3146;}
  .bare-logo{position:absolute;top:16px;left:16px;z-index:6;height:52px;width:auto;
    filter:drop-shadow(0 3px 10px rgba(0,0,0,.45));pointer-events:none;user-select:none;}
  /* view switcher on the image */
  .view-switch{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
    z-index:6;display:flex;gap:4px;padding:4px;border-radius:999px;
    background:rgba(27,21,33,.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 4px 18px rgba(0,0,0,.35);}
  .view-switch button{border:0;cursor:pointer;border-radius:999px;
    font:700 14px/1 -apple-system,Segoe UI,Roboto,'Noto Sans Georgian',sans-serif;
    letter-spacing:.02em;color:#EDE7D1;background:transparent;padding:10px 20px;transition:.15s;}
  .view-switch button.active{background:#EDE7D1;color:#1B1521;}
  .view-switch button:not(.active):hover{background:rgba(237,231,209,.14);}
  @media (max-width:600px){
    .bare-logo{height:42px;top:12px;left:12px;}
    .view-switch button{padding:9px 16px;font-size:13px;}
  }
</style>
</head>
<body>
<div id="pano"></div>
<img class="bare-logo" src="logo.png" alt="BARE by Biograpi">
<div class="view-switch">
  <button id="btn-view1" class="active" onclick="go('view1')">ხედი 1</button>
  <button id="btn-view2" onclick="go('view2')">ხედი 2</button>
</div>
<script src="pannellum.js"></script>
<script>
  function scene(base){return{
    type:'multires',
    multiRes:{basePath:base,path:'/%l/%s%y_%x',fallbackPath:'/fallback/%s',
      extension:'jpg',tileResolution:512,maxLevel:4,cubeResolution:3816},
    hfov:100
  };}
  var viewer = pannellum.viewer('pano', {
    default:{
      firstScene:'view1', autoLoad:true, autoRotate:-2, autoRotateInactivityDelay:3500,
      backgroundColor:[0.486,0.192,0.275], sceneFadeDuration:900,
      showZoomCtrl:true, showFullscreenCtrl:true, keyboardZoom:true, mouseZoom:true,
      minHfov:50, maxHfov:120, compass:false
    },
    scenes:{ view1: scene('bare1'), view2: scene('bare2') }
  });
  function go(id){ viewer.loadScene(id); }
  viewer.on('scenechange', function(id){
    document.getElementById('btn-view1').classList.toggle('active', id==='view1');
    document.getElementById('btn-view2').classList.toggle('active', id==='view2');
  });
</script>
</body>
</html>
